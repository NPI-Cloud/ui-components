name: Publish to npm

# Publishes @npicz/ui-components to npm with provenance via npm Trusted Publishing
# (GitHub OIDC) — no long-lived NPM_TOKEN. Triggered by the version tags the NPI
# monorepo pushes here on each release. The package + provenance attestation are
# tied to THIS public repo + workflow, which is the verifiable "trusted source".
#
# One-time setup on npmjs.com: package @npicz/ui-components → Settings → Trusted
# Publishing → add GitHub Actions publisher: org NPI-Cloud, repo ui-components,
# workflow `publish.yml`.
on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write # required for OIDC trusted publishing + provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted Publishing needs npm >= 11.5.1; the runner ships an older npm.
      - run: npm install -g npm@latest

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish with provenance
        run: npm publish --provenance --access public
